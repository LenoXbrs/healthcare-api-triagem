spring.application.name=healthcare-api-triagem

# ── Database ─────────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:healthcare_triagem}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ── Redis ────────────────────────────────────────────────────────────────────
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

# ── RabbitMQ ─────────────────────────────────────────────────────────────────
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USER:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}

# ── JWT (mesma secret da api-usuarios) ───────────────────────────────────────
jwt.secret=${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}

# ── Porta ──────────────────────────────────────────────────────────────────
server.port=${PORT:${SERVER_PORT:8083}}

# ── Integrações REST (service-to-service) ───────────────────────────────────
services.pacientes.url=${PACIENTES_URL:http://localhost:8081}
services.usuarios.url=${USUARIOS_URL:http://localhost:8082}

# ── Swagger ──────────────────────────────────────────────────────────────────
springdoc.swagger-ui.path=/swagger-ui.html

# ── Actuator / Prometheus ────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.show-details=always
management.prometheus.metrics.export.enabled=true
management.metrics.tags.application=${spring.application.name}
